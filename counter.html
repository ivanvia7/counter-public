<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talking Timer</title>
  <style>
    :root { --bg:#0b1020; --panel:#121a33; --ink:#e6ecff; --muted:#9fb0ff; }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 20% -10%, #1a2459 0, transparent 60%),
                  radial-gradient(1000px 400px at 120% 10%, #0e6ba8 0, transparent 60%), var(--bg);
      color:var(--ink); min-height:100dvh; display:grid; place-items:center; padding:2rem;
    }
    .card{width:100%; max-width:820px; background:linear-gradient(180deg,#1a2550 0%,var(--panel) 100%);
      border:1px solid rgba(255,255,255,.08); border-radius:1.25rem; box-shadow:0 10px 30px rgba(0,0,0,.45);
      padding:1.25rem; overflow:hidden;}
    header{display:flex; align-items:center; gap:.75rem; justify-content:space-between;}
    h1{font-size:clamp(1.2rem,2.5vw,1.6rem); margin:0; letter-spacing:.2px;}
    .status{font-size:.9rem; color:var(--muted);}
    .timer{display:grid; gap:.5rem; justify-items:center; padding:1rem 0 .5rem;}
    .big{font-variant-numeric:tabular-nums; letter-spacing:.5px; font-size:clamp(3rem,12vw,6rem); font-weight:700; line-height:1.05;}
    .secondary{color:var(--muted); font-size:.95rem;}
    .taskline{color:var(--muted); font-size:.95rem; min-height:1.2em}
    .controls{display:flex; flex-wrap:wrap; gap:.6rem; justify-content:center; padding:.5rem 0 1rem;}
    button{
      appearance:none; border:1px solid rgba(255,255,255,.12); color:var(--ink); background:#1b2a5b;
      padding:.7rem 1rem; border-radius:.9rem; font-size:.95rem; cursor:pointer; transition:transform .05s ease, background .2s ease, border-color .2s;
    }
    button:hover{transform:translateY(-1px)}
    button.primary{background:linear-gradient(180deg,#2d3d8d 0%,#1b2a5b 100%); border-color:rgba(255,255,255,.18)}
    button.good{background:linear-gradient(180deg,#2ac7b0 0%,#129e8a 100%)}
    button.danger{background:linear-gradient(180deg,#ff7d7d 0%,#d85a5a 100%)}
    button.flat{background:#15214a}
    button:disabled{opacity:.5; cursor:not-allowed}
    details{border-top:1px solid rgba(255,255,255,.08); padding-top:.75rem; margin-top:.75rem}
    details summary{cursor:pointer; color:var(--muted)}
    .history{display:grid; gap:.5rem; margin-top:.75rem}
    .row{display:flex; align-items:center; justify-content:space-between; gap:.75rem; padding:.6rem .75rem; background:#0f1a3d; border:1px solid rgba(255,255,255,.06); border-radius:.7rem}
    .row b{font-weight:600}
    .row small{color:var(--muted)}
    footer{margin-top:1rem; font-size:.85rem; color:var(--muted); text-align:center}
    select, label, input { font-size:.95rem; }
    input[type="number"]{width:92px; background:#0f1a3d; color:var(--ink); border:1px solid rgba(255,255,255,.12); border-radius:.5rem; padding:.35rem .5rem}
    input[type="text"]{background:#0f1a3d; color:var(--ink); border:1px solid rgba(255,255,255,.12); border-radius:.5rem; padding:.35rem .5rem}
    .panel {
      display:none; gap:.6rem; flex-wrap:wrap; align-items:center; justify-content:center;
      background:#0e1636; border:1px solid rgba(255,255,255,.08); border-radius:.75rem; padding:.6rem .8rem; margin-top:-.5rem;
    }
    .spacer { flex-basis:100%; height:0; }
  </style>
</head>
<body>
  <div class="card" role="application" aria-label="Talking Timer">
    <header>
      <h1>Talking Timer</h1>
      <div class="status" id="status">Idle</div>
    </header>

    <section class="timer" aria-live="polite" aria-atomic="true">
      <div class="big" id="counter">0</div>
      <div class="secondary" id="asTime">00:00:00</div>
      <div class="taskline" id="taskLine"></div>
    </section>

    <div class="controls">
      <button id="startBtn" class="primary">Start</button>
      <button id="pauseBtn" class="flat" disabled>Pause</button>
      <button id="stopBtn" class="good" disabled>Stop & Save</button>
      <button id="muteBtn" class="flat" aria-pressed="false" title="Toggle speech">🔊 Mute</button>
      <button id="clearBtn" class="danger" title="Clear history">Clear History</button>
    </div>

    <div class="controls" aria-label="Main controls">
      <label for="voiceSelect" class="secondary">Voice:</label>
      <select id="voiceSelect" title="Choose speech voice"></select>

      <label class="secondary" for="modeSelect">Mode:</label>
      <select id="modeSelect" title="Timing mode"></select>

      <label class="secondary" style="display:flex; align-items:center; gap:.4rem;">
        <input type="checkbox" id="randEn" />
        Random EN voice
      </label>

      <label class="secondary" for="beepSelect">Beep:</label>
      <select id="beepSelect" title="Beep style"></select>
    </div>

    <!-- Countdown custom panel (only visible in countdown mode) -->
    <div id="cdPanel" class="panel" aria-label="Countdown options">
      <label class="secondary" for="cdMins">Minutes:</label>
      <input id="cdMins" type="number" min="1" max="600" step="1" value="25" title="Countdown minutes" />

      <label class="secondary" for="cdSpeak">Speak every (s):</label>
      <input id="cdSpeak" type="number" min="1" max="3600" step="1" value="5" title="Speak cadence in seconds" />

      <span class="spacer"></span>

      <label class="secondary" style="display:flex; align-items:center; gap:.4rem;">
        <input type="checkbox" id="cdMilestones" />
        Minutes-left milestones
      </label>

      <label class="secondary" for="cdMilestoneEvery">every</label>
      <input id="cdMilestoneEvery" type="number" min="1" max="60" step="1" value="5" title="Milestone every N minutes" />
    </div>

    <!-- Action loop panel (only visible in Action loop mode) -->
    <div id="actPanel" class="panel" aria-label="Action loop options">
      <label class="secondary" for="actPhrase">Phrase:</label>
      <input id="actPhrase" type="text" value="next action" title="Phrase to say at each cycle start" style="width:180px" />

      <label class="secondary" for="actLen">Cycle length (s):</label>
      <input id="actLen" type="number" min="10" max="600" step="1" value="60" title="Seconds to count up before restarting" />

      <label class="secondary" for="actSpeak">Speak every (s):</label>
      <input id="actSpeak" type="number" min="1" max="60" step="1" value="5" title="Speak cadence in seconds inside each cycle" />
    </div>

    <details>
      <summary>History</summary>
      <div class="history" id="history"></div>
    </details>

    <footer>
      Modes: speak every 1/2/5/10/50s, beep-each-second + speak @5s, each minute, <b>Countdown (custom)</b>, <b>Action loop (0..N)</b>, and <b>Voice cycle (10..0 + beep)</b>.
      Beep on every non-announcement second.
    </footer>
  </div>

  <script>
    // ====== Utilities ======
    const $ = (id) => document.getElementById(id);
    const pad = (n) => String(n).padStart(2, '0');
    const clamp = (v,min,max)=>Math.min(max,Math.max(min,v));
    const fmtHMS = (secs) => {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    };

    // ====== Persistence Keys ======
    const VOICE_KEY   = 'talking-timer-voiceURI:v2';
    const MODE_KEY    = 'talking-timer-mode:v6'; // bump
    const RAND_EN_KEY = 'talking-timer-randEN:v1';
    const KEY_HISTORY = 'talking-timer-history:v1';
    const BEEP_KEY    = 'talking-timer-beepStyle:v1';

    // Countdown-specific
    const CD_MIN_KEY       = 'talking-timer-cd-mins:v2';
    const CD_SPEAK_KEY     = 'talking-timer-cd-speakEvery:v2';
    const CD_MS_EN_KEY     = 'talking-timer-cd-milestones-enabled:v2';
    const CD_MS_EVERY_KEY  = 'talking-timer-cd-milestones-everyMin:v2';

    // Action loop-specific
    const ACT_PHRASE_KEY = 'talking-timer-act-phrase:v1';
    const ACT_LEN_KEY    = 'talking-timer-act-len:v1';
    const ACT_SPEAK_KEY  = 'talking-timer-act-speakEvery:v1';

    // ====== Timing Modes ======
    const VOICE_LOOP_START = 10;
    const VOICE_LOOP_END = 0;
    const VOICE_LOOP_COUNT_SPAN = (VOICE_LOOP_START - VOICE_LOOP_END) + 1; // inclusive 10..0
    const VOICE_LOOP_PAUSE_SECS = 3; // hold at 0 and beep each second
    const VOICE_LOOP_TOTAL_SPAN = VOICE_LOOP_COUNT_SPAN + VOICE_LOOP_PAUSE_SECS;

    const MODES = {
      every1    : { label:'Speak every 1s',  speakEvery:1 },
      every2    : { label:'Speak every 2s',  speakEvery:2 },
      every5    : { label:'Speak every 5s',  speakEvery:5 },
      every10   : { label:'Speak every 10s', speakEvery:10 },
      every50   : { label:'Speak every 50s', speakEvery:50 },
      beep5     : { label:'Beep each sec, speak @5s', speakEvery:5 },
      minute    : { label:'Speak each minute', speakEvery:60 },
      countdown : { label:'Countdown (custom)', countdown:true }, // independent cadence
      actionLoop: { label:'Action loop (0..N)', actionLoop:true }, // NEW
      voiceCycle10: { label:'Voice cycle (10..0 + beep)', voiceCycle10:true },
    };

    // ====== Speech / Voices ======
    let muted = false;
    let selectedVoiceURI = localStorage.getItem(VOICE_KEY) || '';
    let mode = localStorage.getItem(MODE_KEY) || 'every1';
    let randomEN = (localStorage.getItem(RAND_EN_KEY) === '1');

    function getVoices() { try { return window.speechSynthesis ? speechSynthesis.getVoices() : []; } catch { return []; } }
    function onlyEnRu(voices) {
      return voices.filter(v => (v.lang||'').toLowerCase().startsWith('en') || (v.lang||'').toLowerCase().startsWith('ru'));
    }
    function englishVoices() { return getVoices().filter(v => (v.lang||'').toLowerCase().startsWith('en')); }
    function randomEnglishVoice() { const list = englishVoices(); return list.length ? list[Math.floor(Math.random()*list.length)] : null; }
    function chooseDefaultVoice(voices) {
      const byLang = (pfx) => voices.find(v => (v.lang||'').toLowerCase().startsWith(pfx));
      return byLang('en') || byLang('ru') || voices.find(v=>v.default) || voices[0] || null;
    }
    function getSelectedVoice() {
      const list = onlyEnRu(getVoices());
      return list.find(v => v.voiceURI === selectedVoiceURI) || list.find(v=>v.default) || chooseDefaultVoice(list);
    }
    function populateVoiceMenu() {
      const sel = $('voiceSelect'); if (!sel) return;
      const voices = onlyEnRu(getVoices());
      sel.innerHTML = '';
      if (!voices.length) { sel.innerHTML = '<option>No EN/RU voices</option>'; sel.disabled=false; return; }
      sel.disabled = false;
      const sorted = voices.slice().sort((a,b)=> a.name.localeCompare(b.name));
      for (const v of sorted) {
        const opt = document.createElement('option');
        opt.value = v.voiceURI;
        opt.textContent = `${v.name} (${v.lang})${v.default ? ' — default' : ''}`;
        sel.appendChild(opt);
      }
      if (!selectedVoiceURI || !sorted.some(v=>v.voiceURI===selectedVoiceURI)) {
        const picked = chooseDefaultVoice(sorted);
        selectedVoiceURI = picked ? picked.voiceURI : '';
        localStorage.setItem(VOICE_KEY, selectedVoiceURI);
      }
      sel.value = selectedVoiceURI;

      const hasEN = englishVoices().length > 0;
      const chk = $('randEn');
      if (chk) { chk.disabled = !hasEN; chk.checked = hasEN && randomEN; if (!hasEN) { randomEN=false; localStorage.setItem(RAND_EN_KEY,'0'); } }
    }
    function initSpeech() {
      if (!('speechSynthesis' in window)) {
        $('status').textContent = 'Speech not supported';
        const sel = $('voiceSelect');
        if (sel) { sel.innerHTML = '<option>Not supported</option>'; sel.disabled=false; }
        initModeControls();
        return;
      }
      speechSynthesis.getVoices();
      populateVoiceMenu();
      speechSynthesis.onvoiceschanged = populateVoiceMenu;
      initModeControls();
    }

    // Non-interrupting speaker
    let pendingSpeak = null;
    function voiceForUtterance() {
      if (randomEN) {
        const v = randomEnglishVoice();
        if (v) return v;
      }
      return getSelectedVoice();
    }
    function trySpeak(text) {
      if (muted) return;
      const synth = window.speechSynthesis; if (!synth) return;
      if (synth.speaking) { pendingSpeak = String(text); return; }
      const u = new SpeechSynthesisUtterance(String(text));
      u.rate = 1; u.pitch = 1;
      const v = voiceForUtterance(); if (v) u.voice = v;
      u.onend = () => { if (pendingSpeak && !muted) { const next = pendingSpeak; pendingSpeak=null; trySpeak(next); } };
      try { synth.speak(u); } catch {}
    }

    // ====== Beep (Web Audio) — rich styles ======
    let audioCtx = null, gainNode = null;
    let selectedBeepStyle = localStorage.getItem(BEEP_KEY) || 'shortHigh';

    const BEEP_STYLES = {
      shortHigh: { label:'Short: High (880Hz)',     seq:[{f:880, d:0.06}] , type:'sine',   gain:0.12 },
      shortLow : { label:'Short: Low (440Hz)',      seq:[{f:440, d:0.08}] , type:'sine',   gain:0.14 },
      click    : { label:'Click (2kHz triangle)',   seq:[{f:2000,d:0.03}], type:'triangle',gain:0.14 },
      double   : { label:'Double (660→880 square)', seq:[{f:660,d:0.05},{gap:0.05},{f:880,d:0.05}], type:'square', gain:0.14 },
      chime    : { label:'Chime (660→990 sine)',    seq:[{f:660,d:0.06},{gap:0.02},{f:990,d:0.08}], type:'sine',    gain:0.14 },
      sonar    : { label:'Sonar ping', type:'sine', gain:0.16, seq:[{f:700, rampTo:1050, d:0.25, vibHz:7, vibDepth:12}] },
      alarm    : { label:'Alarm (repeating square)', type:'square', gain:0.12, seq:[{f:880,d:0.12},{gap:0.06},{f:880,d:0.12}] },
      riser    : { label:'Riser (up sweep)', type:'triangle', gain:0.14, seq:[{f:400, rampTo:1600, d:0.18}] },
      fall     : { label:'Fall (down sweep)', type:'triangle', gain:0.14, seq:[{f:1600, rampTo:400, d:0.18}] },
      woodblock: { label:'Woodblock (bandpass noise)', gain:0.20, seq:[{noise:true, d:0.05, noiseFilter:'bandpass', noiseFreq:1500, noiseQ:12}] },
      hiHat    : { label:'Hi-hat (highpass noise)',  gain:0.18, seq:[{noise:true, d:0.04, noiseFilter:'highpass', noiseFreq:6000, noiseQ:0.7}] },
      buzz     : { label:'Buzz (AM 20 Hz)', type:'sawtooth', gain:0.12, seq:[{f:600, d:0.18, amHz:20, amDepth:0.8}] },
      pluck    : { label:'Pluck (exp decay)', type:'sine', gain:0.16, seq:[{f:880, d:0.18, expDecay:true}] },
      bellFM   : { label:'Bell (FM metallic)', type:'sine', gain:0.14, seq:[{f:660, d:0.22, fmHz:660, fmDepth:220, expDecay:true}] },
      ripple   : { label:'Ripple (three quicks)', type:'sine', gain:0.14, seq:[{f:900,d:0.03},{gap:0.05},{f:900,d:0.03},{gap:0.05},{f:900,d:0.08}] },
      wobble   : { label:'Wobble (vibrato)', type:'triangle', gain:0.14, seq:[{f:700, d:0.20, vibHz:5.5, vibDepth:18}] },
      none     : { label:'No beep', none:true },
    };

    function ensureAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 1; // master at unity to avoid double-attenuation
      gainNode.connect(audioCtx.destination);
    }

    function playOscStep(t, step, baseType, baseGain) {
      const osc = audioCtx.createOscillator();
      const g   = audioCtx.createGain();

      osc.type = step.type || baseType || 'sine';
      osc.frequency.setValueAtTime(step.f || 880, t);
      if (step.rampTo && step.d) osc.frequency.linearRampToValueAtTime(step.rampTo, t + step.d);

      // Vibrato
      let vibOsc=null, vibGain=null;
      if (step.vibHz && step.vibDepth) {
        vibOsc = audioCtx.createOscillator();
        vibGain = audioCtx.createGain();
        vibOsc.frequency.value = step.vibHz;
        vibGain.gain.value = step.vibDepth;
        vibOsc.connect(vibGain); vibGain.connect(osc.frequency);
        vibOsc.start(t); vibOsc.stop(t + (step.d || 0.06));
      }
      // FM
      let fmOsc=null, fmGain=null;
      if (step.fmHz && step.fmDepth) {
        fmOsc = audioCtx.createOscillator();
        fmGain = audioCtx.createGain();
        fmOsc.type='sine'; fmOsc.frequency.value = step.fmHz; fmGain.gain.value = step.fmDepth;
        fmOsc.connect(fmGain); fmGain.connect(osc.frequency);
        fmOsc.start(t); fmOsc.stop(t + (step.d || 0.06));
      }
      // AM (tremolo)
      let amOsc=null, amGain=null;
      if (step.amHz && step.amDepth) {
        amOsc = audioCtx.createOscillator();
        amGain = audioCtx.createGain();
        amOsc.frequency.value = step.amHz;
        amGain.gain.value = step.amDepth * baseGain;
        amOsc.connect(amGain); amGain.connect(g.gain);
        amOsc.start(t); amOsc.stop(t + (step.d || 0.06));
      }

      const d = step.d || 0.06;
      const start=t, end=t+d;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(baseGain, start + Math.min(0.008, d * 0.2));
      if (step.expDecay) g.gain.exponentialRampToValueAtTime(Math.max(0.0001, baseGain*0.002), end);
      else g.gain.linearRampToValueAtTime(0, end);

      osc.connect(g); g.connect(gainNode);
      osc.start(start); osc.stop(end);
      return end;
    }

    function playNoiseStep(t, step, baseGain) {
      const dur = step.d || 0.06;
      const len = Math.floor(audioCtx.sampleRate * dur);
      const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<len;i++) data[i] = Math.random()*2-1;
      const src = audioCtx.createBufferSource(); src.buffer=buffer;

      let node = src;
      if (step.noiseFilter) {
        const biq = audioCtx.createBiquadFilter();
        biq.type = step.noiseFilter; biq.frequency.value = step.noiseFreq || 2000; biq.Q.value = step.noiseQ || 1;
        node.connect(biq); node = biq;
      }

      const g = audioCtx.createGain();
      const start=t, end=t+dur;
      g.gain.setValueAtTime(0,start);
      g.gain.linearRampToValueAtTime(baseGain, start + Math.min(0.006, dur*0.25));
      g.gain.linearRampToValueAtTime(0, end);

      node.connect(g); g.connect(gainNode);
      src.start(start); src.stop(end);
      return end;
    }

    function beep() {
      if (!audioCtx) return;
      const style = BEEP_STYLES[selectedBeepStyle] || BEEP_STYLES.shortHigh;
      if (style.none) return;
      let t = audioCtx.currentTime;
      const baseType = style.type || 'sine';
      const baseGain = style.gain ?? 0.14;
      for (const step of style.seq) {
        if (step.gap) { t += step.gap; continue; }
        t = step.noise ? playNoiseStep(t, step, baseGain) : playOscStep(t, step, baseType, baseGain);
      }
    }

    function populateBeepMenu() {
      const sel = $('beepSelect'); if (!sel) return;
      sel.innerHTML = '';
      for (const [id, def] of Object.entries(BEEP_STYLES)) {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = def.label;
        sel.appendChild(opt);
      }
      if (!BEEP_STYLES[selectedBeepStyle]) selectedBeepStyle = 'shortHigh';
      sel.value = selectedBeepStyle; sel.disabled=false;
    }

    // ====== Timer (count-up, countdown, action loop) ======
    let running = false, paused = false;
    let startEpoch = 0, elapsedMs = 0, lastWhole = 0, lastElapsedWhole = -1, intervalId = null;
    let currentTaskName = '';

    // Countdown helpers
    function readCdConfigFromUI() {
      const mins = clamp(parseInt($('cdMins').value,10)||25, 1, 600);
      const speak = clamp(parseInt($('cdSpeak').value,10)||5, 1, 3600);
      const msEnabled = !!$('cdMilestones').checked;
      const msEvery = clamp(parseInt($('cdMilestoneEvery').value,10)||5, 1, 60);
      return { mins, speakEvery:speak, milestones:msEnabled, milestoneEveryMin:msEvery };
    }
    function loadCdConfigDefaults() {
      $('cdMins').value = String(clamp(parseInt(localStorage.getItem(CD_MIN_KEY),10)||25, 1, 600));
      $('cdSpeak').value = String(clamp(parseInt(localStorage.getItem(CD_SPEAK_KEY),10)||5, 1, 3600));
      $('cdMilestones').checked = localStorage.getItem(CD_MS_EN_KEY) === '1';
      $('cdMilestoneEvery').value = String(clamp(parseInt(localStorage.getItem(CD_MS_EVERY_KEY),10)||5, 1, 60));
    }
    function persistCdConfig({mins,speakEvery,milestones,milestoneEveryMin}) {
      localStorage.setItem(CD_MIN_KEY, String(mins));
      localStorage.setItem(CD_SPEAK_KEY, String(speakEvery));
      localStorage.setItem(CD_MS_EN_KEY, milestones ? '1' : '0');
      localStorage.setItem(CD_MS_EVERY_KEY, String(milestoneEveryMin));
    }

    let countdownTotalSecs = 1500; // set on start

    // Action loop helpers
    function isActionLoop() { return !!(MODES[mode] && MODES[mode].actionLoop); }
    function isVoiceCycle10() { return !!(MODES[mode] && MODES[mode].voiceCycle10); }
    function voiceCycleStep() {
      return secondsElapsed() % VOICE_LOOP_TOTAL_SPAN;
    }
    function readActConfigFromUI() {
      const phrase = String($('actPhrase').value || 'next action').trim() || 'next action';
      const len = clamp(parseInt($('actLen').value,10)||60, 10, 600);
      const speakEvery = clamp(parseInt($('actSpeak').value,10)||5, 1, 60);
      return { phrase, len, speakEvery };
    }
    function loadActDefaults() {
      $('actPhrase').value = String(localStorage.getItem(ACT_PHRASE_KEY) || 'next action');
      $('actLen').value = String(clamp(parseInt(localStorage.getItem(ACT_LEN_KEY),10)||60, 10, 600));
      $('actSpeak').value = String(clamp(parseInt(localStorage.getItem(ACT_SPEAK_KEY),10)||5, 1, 60));
    }
    function persistActConfig({phrase,len,speakEvery}) {
      localStorage.setItem(ACT_PHRASE_KEY, phrase);
      localStorage.setItem(ACT_LEN_KEY, String(len));
      localStorage.setItem(ACT_SPEAK_KEY, String(speakEvery));
    }

    function isCountdown() { return !!(MODES[mode] && MODES[mode].countdown); }

    function secondsElapsed() {
      if (!running) return Math.floor(elapsedMs/1000);
      const now = Date.now();
      const total = paused ? elapsedMs : (now - startEpoch);
      return Math.floor(total / 1000);
    }

    function shownSeconds() {
      if (isCountdown()) {
        const remain = Math.max(0, countdownTotalSecs - secondsElapsed());
        return remain;
      }
      if (isActionLoop()) {
        const { len } = readActConfigFromUI();
        return secondsElapsed() % len; // 0..len-1
      }
      if (isVoiceCycle10()) {
        const step = voiceCycleStep();
        if (step < VOICE_LOOP_COUNT_SPAN) return VOICE_LOOP_START - step; // 10..0
        return VOICE_LOOP_END; // pause on 0
      }
      return secondsElapsed();
    }

    function updateUI() {
      const disp = shownSeconds();
      $('counter').textContent = disp;
      $('asTime').textContent = fmtHMS(disp);
      $('taskLine').textContent = currentTaskName ? `Task: ${currentTaskName}` : '';
    }

    function willSpeakThisSecond_countup(cfg, secs) {
      return secs % (cfg.speakEvery||1) === 0;
    }
    function willSpeakThisSecond_countdown(cdCfg, remainSecs) {
      return remainSecs % (cdCfg.speakEvery||5) === 0;
    }
    function maybeAnnounceMinute_countup(secs) {
      if (secs>0 && secs%60===0) {
        const mins = Math.floor(secs/60);
        const milestone = (mins===5||mins===10||mins===20||mins===30||(mins>30 && mins%10===0));
        if (milestone) trySpeak(`${mins} minutes`);
      }
    }
    function maybeAnnounceMinute_countdown(cdCfg, remainSecs) {
      if (!cdCfg.milestones) return;
      const period = (cdCfg.milestoneEveryMin||5)*60;
      if (remainSecs>0 && remainSecs%period===0) {
        const mins = Math.floor(remainSecs/60);
        trySpeak(`${mins} minutes left`);
      }
    }

    function tick() {
      if (!running || paused) return;
      const elapsed = secondsElapsed();
      if (elapsed === lastElapsedWhole) return;
      lastElapsedWhole = elapsed;

      const display = shownSeconds();
      const prev = lastWhole;
      if (display !== lastWhole) { lastWhole = display; updateUI(); }

      if (isCountdown()) {
        const cdCfg = readCdConfigFromUI();
        if (display === 0) { beep(); trySpeak('time!'); stopTimerAndSave(true); return; }
        const announce = willSpeakThisSecond_countdown(cdCfg, display);
        if (!announce) beep();
        if (announce) trySpeak(display);
        maybeAnnounceMinute_countdown(cdCfg, display);

      } else if (isActionLoop()) {
        const act = readActConfigFromUI();
        const cycleStart = (prev > display) || (secondsElapsed() === 0); // wrapped or first
        if (cycleStart) { trySpeak(act.phrase); beep(); }

        const announce = (display > 0) && (display % act.speakEvery === 0);
        if (!announce) beep();
        if (announce) trySpeak(display);

      } else if (isVoiceCycle10()) {
        const step = voiceCycleStep();
        const inCountPhase = step < VOICE_LOOP_COUNT_SPAN;
        if (inCountPhase) trySpeak(display);
        if (display === VOICE_LOOP_END) beep();

      } else {
        const cfg = MODES[mode] || MODES.every1;
        const announce = willSpeakThisSecond_countup(cfg, display);
        if (!announce) beep();
        if (announce) trySpeak(display);
        maybeAnnounceMinute_countup(display);
      }
    }

    function startTimer() {
      if (running) return;

      if (isCountdown()) {
        const cd = readCdConfigFromUI();
        countdownTotalSecs = cd.mins * 60;
        persistCdConfig(cd);
      }
      if (isActionLoop()) {
        const act = readActConfigFromUI();
        persistActConfig(act);
      }

      const name = prompt('Task name?', currentTaskName || (isCountdown() ? 'Countdown' : isActionLoop() ? 'Action loop' : 'Focus block'));
      if (!name || !name.trim()) return;
      currentTaskName = name.trim();

      running = true; paused = false;
      $('status').textContent = statusText();
      $('startBtn').disabled = true;
      $('pauseBtn').disabled = false;
      $('stopBtn').disabled = false;

      ensureAudio(); audioCtx?.resume?.();

      startEpoch = Date.now() - elapsedMs;
      lastWhole = shownSeconds();
      lastElapsedWhole = secondsElapsed();
      updateUI();

      if (isCountdown()) {
        const cdCfg = readCdConfigFromUI();
        if (lastWhole % cdCfg.speakEvery === 0) trySpeak(lastWhole);
      } else if (isActionLoop()) {
        const act = readActConfigFromUI();
        trySpeak(act.phrase); // say phrase at cycle start
        // If you want it to also say "0" immediately when cadence matches, uncomment:
        // if (0 % act.speakEvery === 0) trySpeak(0);
      } else if (isVoiceCycle10()) {
        trySpeak(VOICE_LOOP_START);
      } else {
        const cfg = MODES[mode] || MODES.every1;
        if (lastWhole % (cfg.speakEvery||1) === 0) trySpeak(lastWhole);
      }

      if (!intervalId) intervalId = setInterval(tick, 250);
    }

    function pauseTimer() {
      if (!running || paused) return;
      paused = true;
      $('status').textContent = 'Paused';
      $('pauseBtn').textContent = 'Resume';
      elapsedMs = Date.now() - startEpoch;
    }
    function resumeTimer() {
      if (!running || !paused) return;
      paused = false;
      $('status').textContent = statusText();
      $('pauseBtn').textContent = 'Pause';
      startEpoch = Date.now() - elapsedMs;
      lastWhole = shownSeconds();
      lastElapsedWhole = secondsElapsed();
    }

    function stopTimerAndSave(reachedZero=false) {
      if (!running) return;
      const wasPaused = paused;

      running = false; paused = false;
      $('status').textContent = reachedZero ? 'Completed' : 'Stopped';
      $('startBtn').disabled = false;
      $('pauseBtn').disabled = true;
      $('pauseBtn').textContent = 'Pause';
      $('stopBtn').disabled = true;

      if (intervalId) { clearInterval(intervalId); intervalId = null; }

      elapsedMs = wasPaused ? elapsedMs : (Date.now() - startEpoch);
      const elapsedSecs = Math.max(0, Math.floor(elapsedMs/1000));

      let savedSeconds = elapsedSecs;
      let note = '';

      if (isCountdown()) {
        const planned = Math.max(0, countdownTotalSecs);
        const remaining = Math.max(0, planned - elapsedSecs);
        savedSeconds = elapsedSecs;
        note = reachedZero ? ' (countdown finished)' : ` (stopped ${fmtHMS(remaining)} early)`;
      }
      if (isActionLoop()) {
        const { len } = readActConfigFromUI();
        note = ` (action loop len ${len}s)`;
      }
      if (isVoiceCycle10()) {
        note = ` (voice cycle ${VOICE_LOOP_START}..${VOICE_LOOP_END})`;
      }

      const taskName = currentTaskName || (isCountdown() ? 'Countdown' : isActionLoop() ? 'Action loop' : isVoiceCycle10() ? 'Voice cycle 10..0' : 'Untitled task');

      const item = { id: crypto.randomUUID(), name: taskName + note, seconds: savedSeconds, savedAt: new Date().toISOString() };
      const list = getHistory(); list.unshift(item); setHistory(list); renderHistory();

      elapsedMs = 0; lastWhole = 0; lastElapsedWhole = -1; pendingSpeak = null; currentTaskName = '';
      updateUI();
    }

    // ====== History ======
    function getHistory() { try { return JSON.parse(localStorage.getItem(KEY_HISTORY)) || []; } catch { return []; } }
    function setHistory(list) { try { localStorage.setItem(KEY_HISTORY, JSON.stringify(list)); } catch {} }
    function clearHistory() { if (confirm('Clear all saved activities?')) { localStorage.removeItem(KEY_HISTORY); renderHistory(); } }
    function renderHistory() {
      const wrap = $('history'); wrap.innerHTML = '';
      const list = getHistory();
      if (!list.length) { wrap.innerHTML = '<span style="color:var(--muted)">No entries yet.</span>'; return; }
      for (const it of list) {
        const mins = (it.seconds / 60).toFixed(2);
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div>
            <b>${escapeHtml(it.name)}</b>
            <div><small>${fmtHMS(it.seconds)} (${mins} min)</small></div>
          </div>
          <div><small>${new Date(it.savedAt).toLocaleString()}</small></div>
        `;
        wrap.appendChild(row);
      }
    }
    function escapeHtml(str='') { return String(str).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }

    // ====== UI wiring ======
    function statusText() {
      const cfg = MODES[mode] || MODES.every1;
      let extra = '';
      if (isCountdown()) {
        const { mins, speakEvery } = readCdConfigFromUI();
        extra = `, ${mins} min, speak ${speakEvery}s`;
      } else if (isActionLoop()) {
        const { len, speakEvery } = readActConfigFromUI();
        extra = `, action loop: 0..${len-1}, speak ${speakEvery}s`;
      } else if (isVoiceCycle10()) {
        extra = `, voice cycle: ${VOICE_LOOP_START}..${VOICE_LOOP_END}, +${VOICE_LOOP_PAUSE_SECS}s pause beeps`;
      } else if (cfg.speakEvery) {
        extra = `, ${cfg.label}`;
      }
      return `Running${extra ? ` (${extra})` : ''}`;
    }

    function initModeControls() {
      const modeSel = $('modeSelect');
      modeSel.innerHTML = '';
      Object.entries(MODES).forEach(([id, cfg]) => {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = cfg.label;
        modeSel.appendChild(opt);
      });
      if (!MODES[mode]) mode = 'every1';
      modeSel.value = mode;

      const rand = $('randEn');
      if (rand) rand.checked = randomEN;

      toggleCountdownPanel();
      toggleActionPanel();
    }

    function toggleCountdownPanel() {
      const show = isCountdown();
      const panel = $('cdPanel');
      panel.style.display = show ? 'flex' : 'none';
      if (show) loadCdConfigDefaults();
    }

    function toggleActionPanel() {
      const show = isActionLoop();
      const panel = $('actPanel');
      panel.style.display = show ? 'flex' : 'none';
      if (show) loadActDefaults();
    }

    // Pre-start init
    renderHistory();
    $('counter').textContent = '0';
    $('asTime').textContent = '00:00:00';
    initModeControls();
    populateBeepMenu();
    initSpeech();

    // Listeners
    $('startBtn').addEventListener('click', () => { ensureAudio(); startTimer(); });
    $('stopBtn').addEventListener('click', () => stopTimerAndSave(false));
    $('pauseBtn').addEventListener('click', () => { paused ? resumeTimer() : pauseTimer(); });
    $('muteBtn').addEventListener('click', (e) => {
      muted = !muted;
      e.currentTarget.setAttribute('aria-pressed', String(muted));
      e.currentTarget.textContent = muted ? '🔇 Unmute' : '🔊 Mute';
      if (muted) window.speechSynthesis?.cancel();
    });
    $('clearBtn').addEventListener('click', clearHistory);

    $('modeSelect').addEventListener('change', (e) => {
      const val = e.currentTarget.value;
      mode = MODES[val] ? val : 'every1';
      localStorage.setItem(MODE_KEY, mode);
      toggleCountdownPanel();
      toggleActionPanel();
      if (running && !paused) $('status').textContent = statusText();
    });
    $('voiceSelect').addEventListener('change', (e) => {
      selectedVoiceURI = e.currentTarget.value; localStorage.setItem(VOICE_KEY, selectedVoiceURI);
    });
    $('randEn').addEventListener('change', (e) => {
      randomEN = !!e.currentTarget.checked;
      localStorage.setItem(RAND_EN_KEY, randomEN ? '1' : '0');
    });
    $('beepSelect').addEventListener('change', (e) => {
      selectedBeepStyle = e.currentTarget.value;
      localStorage.setItem(BEEP_KEY, selectedBeepStyle);
    });

    // Persist options for countdown & action loop
    ['cdMins','cdSpeak','cdMilestones','cdMilestoneEvery'].forEach(id => {
      $(id).addEventListener('change', () => {
        const cfg = readCdConfigFromUI();
        persistCdConfig(cfg);
        if (isCountdown()) {
          countdownTotalSecs = cfg.mins * 60;
          if (running && !paused) $('status').textContent = statusText();
        }
      });
    });
    ['actPhrase','actLen','actSpeak'].forEach(id => {
      $(id).addEventListener('change', () => {
        const cfg = readActConfigFromUI();
        persistActConfig(cfg);
        if (running && !paused) $('status').textContent = statusText();
      });
    });

  </script>
</body>
</html>
